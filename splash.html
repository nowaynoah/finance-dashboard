<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FunFinance | Welcome</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="splash-body">

  <div class="splash-card">
    <div class="splash-logo">FunFinance</div>
    <h1 class="splash-title">Your finances,<br/>at a glance.</h1>
    <p class="splash-subtitle">Enter your name to get started.</p>

    <input
      type="text"
      id="usernameInput"
      class="splash-input"
      placeholder="Your name or username"
      maxlength="30"
    />

    <p class="splash-error" id="splashError"></p>

    <button class="splash-btn" id="getStartedBtn">Get Started →</button>
  </div>

  <script src="js/splash.js"></script>
</body>
</html>
