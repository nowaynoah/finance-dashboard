<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FunFinance | Goals</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">FunFinance</div>

    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="calculators.html">Calculators</a></li>
      <li><a href="goals.html" class="active">Goals</a></li>
      <li><a href="news.html">News</a></li>
    </ul>

    <button class="theme-toggle">Light Mode</button>
  </nav>

  <main class="container">
    <h1 class="page-title">Goals</h1>
    <p class="page-subtitle">Track your savings goals and spending limits.</p>

    <div class="goals-grid">

      <div class="goals-column">
        <div class="goals-column-header">
          <h2 class="goals-column-title">💸 Monthly Budget Limits</h2>
          <button class="add-goal-btn" id="add-limit-btn">+ Add Limit</button>
        </div>
        <div class="goals-list" id="limits-list"></div>
      </div>

      <div class="goals-column">
        <div class="goals-column-header">
          <h2 class="goals-column-title">🎯 Savings Goals</h2>
          <button class="add-goal-btn" id="add-savings-btn">+ Add Goal</button>
        </div>
        <div class="goals-list" id="savings-list"></div>
      </div>

    </div>
  </main>

  <div class="modal-overlay" id="limit-modal-overlay">
    <div class="modal">
      <h2 class="modal-title">Add Budget Limit</h2>
      <p class="modal-subtitle">Set a monthly spending limit for a category.</p>

      <div class="calc-input-group">
        <label for="limit-name-input">Category Name</label>
        <input type="text" id="limit-name-input" placeholder="e.g. Groceries" maxlength="30" />

        <label for="limit-spent-input">Amount Spent So Far ($)</label>
        <input type="number" id="limit-spent-input" placeholder="e.g. 45" />

        <label for="limit-max-input">Monthly Limit ($)</label>
        <input type="number" id="limit-max-input" placeholder="e.g. 150" />
      </div>

      <p class="modal-error" id="limit-error"></p>

      <div class="modal-buttons">
        <button class="modal-cancel-btn" id="limit-cancel-btn">Cancel</button>
        <button class="calc-btn" id="limit-save-btn">Save Limit</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="savings-modal-overlay">
    <div class="modal">
      <h2 class="modal-title">Add Savings Goal</h2>
      <p class="modal-subtitle">Set a target for something you're saving towards.</p>

      <div class="calc-input-group">
        <label for="savings-name-input">Goal Name</label>
        <input type="text" id="savings-name-input" placeholder="e.g. New Laptop" maxlength="30" />

        <label for="savings-saved-input">Amount Saved So Far ($)</label>
        <input type="number" id="savings-saved-input" placeholder="e.g. 200" />

        <label for="savings-target-input">Target Amount ($)</label>
        <input type="number" id="savings-target-input" placeholder="e.g. 1500" />
      </div>

      <p class="modal-error" id="savings-error"></p>

      <div class="modal-buttons">
        <button class="modal-cancel-btn" id="savings-cancel-btn">Cancel</button>
        <button class="calc-btn" id="savings-save-btn">Save Goal</button>
      </div>
    </div>
  </div>

  <script src="js/goals.js"></script>
</body>
</html>
